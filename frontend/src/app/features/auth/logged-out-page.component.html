<app-auth-shell
  [eyebrow]="'auth.loggedOutEyebrow' | transloco"
  [title]="'auth.loggedOutTitle' | transloco"
  [subtitle]="'auth.loggedOutBody' | transloco"
  [visualKicker]="'auth.visual.kicker' | transloco"
  [visualTitle]="'auth.visual.title' | transloco"
  [visualBody]="'auth.visual.body' | transloco"
  accent="amber">
  <div class="logged-out-card rounded-[1.5rem] border border-amber-200/60 bg-white/70 p-5 shadow-sm dark:border-amber-900/40 dark:bg-slate-950/35">
    <div class="flex items-start gap-4">
      <div class="logged-out-card__icon">
        <mat-icon>logout</mat-icon>
      </div>

      <div class="grid gap-2">
        <p class="text-sm uppercase tracking-[0.12em] text-amber-700 dark:text-amber-300">
          {{ 'auth.loggedOutEyebrow' | transloco }}
        </p>
        <p class="text-sm leading-6 text-slate-600 dark:text-slate-300">
          {{ 'auth.loggedOutBody' | transloco }}
        </p>
      </div>
    </div>

    <div class="logged-out-card__actions">
      <a mat-flat-button routerLink="/login">{{ 'auth.login' | transloco }}</a>
      <a mat-stroked-button routerLink="/dashboard">{{ 'dashboard.primaryCta' | transloco }}</a>
    </div>
  </div>
</app-auth-shell>

<section class="admin-page__header">
  <div>
    <h1>{{ 'admin.audit.title' | transloco }}</h1>
    <p>{{ 'admin.audit.subtitle' | transloco }}</p>
  </div>
</section>

<section class="admin-page__grid">
  <mat-card appearance="outlined">
    <app-server-table
      [columns]="columns()"
      [rows]="rows()"
      [total]="response().total"
      [pageIndex]="response().page - 1"
      [pageSize]="response().pageSize"
      [sortActive]="tableState().sort ?? ''"
      [sortDirection]="tableState().direction ?? ''"
      [emptyMessage]="'admin.audit.empty' | transloco"
      (pageChange)="onPageChange($event)"
      (filterChange)="onFilterChange($event)"
      (sortChange)="onSortChange($event)"
    />
  </mat-card>
</section>

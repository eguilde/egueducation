<section class="auth-shell" [class]="accentClass()">
  <main class="auth-panel">
    <div class="auth-panel__surface">
      <header class="auth-panel__topbar">
        <div class="auth-panel__brand">
          <span class="auth-panel__badge">EguEducation</span>
          <span class="auth-panel__caption">Identity</span>
        </div>

        <div class="auth-panel__controls">
          <button
            type="button"
            class="theme-toggle"
            mat-icon-button
            [attr.aria-label]="'appearance.mode' | transloco"
            (click)="theme.toggleTheme()">
            <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
          </button>

          <mat-button-toggle-group
            class="language-toggle"
            [value]="theme.language()"
            [attr.aria-label]="'appearance.language' | transloco"
            (change)="theme.setLanguage($event.value)">
            <mat-button-toggle value="ro">RO</mat-button-toggle>
            <mat-button-toggle value="en">EN</mat-button-toggle>
          </mat-button-toggle-group>
        </div>
      </header>

      <div class="auth-panel__content">
        @if (eyebrow()) {
          <p class="auth-panel__eyebrow">{{ eyebrow() }}</p>
        }
        <h1 class="auth-panel__title">{{ title() }}</h1>
        @if (subtitle()) {
          <p class="auth-panel__subtitle">{{ subtitle() }}</p>
        }

        <div class="auth-panel__body">
          <ng-content />
        </div>
      </div>
    </div>
  </main>

  <aside class="auth-visual" aria-hidden="true">
    <img
      class="auth-visual__image"
      ngSrc="/assets/auth-login-background.svg"
      width="1600"
      height="1200"
      alt="" />
    <div class="auth-visual__scrim"></div>
    <div class="visual-copy">
      <p class="visual-kicker">{{ visualKicker() }}</p>
      <h2>{{ visualTitle() }}</h2>
      <p>{{ visualBody() }}</p>
    </div>
  </aside>
</section>

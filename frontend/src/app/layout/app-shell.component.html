<div class="shell min-h-dvh bg-surface-50 text-color dark:bg-surface-950">
  <p-toolbar styleClass="shell__toolbar">
    <ng-template pTemplate="start">
      <p-button
        type="button"
        icon="pi pi-bars"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        ariaLabel="Deschide meniul"
        (onClick)="toggleDrawer()"
      />
    </ng-template>

    <ng-template pTemplate="center">
      <div class="flex min-w-0 items-center justify-center px-3 text-center">
        <span class="truncate text-base font-black tracking-[-0.02em] sm:text-lg">
          {{ branding.projectTitle() }}
        </span>
      </div>
    </ng-template>

    <ng-template pTemplate="end">
      <div class="flex items-center gap-2">
        <p-button
          type="button"
          icon="pi pi-palette"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          ariaLabel="Tema aplicatiei"
          (onClick)="themePopover.toggle($event)"
        />
      </div>
    </ng-template>
  </p-toolbar>

  <p-popover #themePopover [dismissable]="true" appendTo="body" styleClass="shell__theme-popover">
    <app-theme-panel />
  </p-popover>

  <p-drawer
    [visible]="drawerVisible()"
    (visibleChange)="drawerVisible.set($event)"
    [modal]="isHandset()"
    [dismissible]="isHandset()"
    [showCloseIcon]="false"
    [blockScroll]="isHandset()"
    styleClass="shell__drawer"
  >
    <ng-template pTemplate="headless">
      <aside class="flex h-full min-h-0 flex-col bg-surface-0 dark:bg-surface-950">
        <div class="min-h-0 flex-1 overflow-auto p-3 pt-4">
          @if (authenticated()) {
            <nav class="grid gap-1">
              @for (item of visibleNavItems(); track item.route) {
                <a
                  [routerLink]="item.route"
                  routerLinkActive="is-active"
                  class="shell__nav-link"
                  (click)="closeMobileNav()"
                >
                  <i [class]="item.icon"></i>
                  <span>{{ item.labelKey | transloco }}</span>
                </a>
              }
            </nav>
          } @else {
            <div class="shell__empty-state rounded-2xl border border-dashed border-surface-200 bg-surface-50 p-4 text-sm text-muted-color dark:border-surface-800 dark:bg-surface-900">
              Autentifică-te pentru a vedea meniurile și funcțiile disponibile în platformă.
            </div>
          }
        </div>

        <div class="shell__drawer-footer mt-auto border-t border-surface-200 p-3 dark:border-surface-800">
          @if (authenticated()) {
            <button
              type="button"
              class="shell__account-button"
              (click)="openProfile()"
            >
              <span class="shell__account-avatar">
                {{ userLabel().slice(0, 1) | uppercase }}
              </span>
              <span class="min-w-0 flex-1 text-left">
                <span class="block truncate text-sm font-black text-color">{{ userLabel() }}</span>
                <span class="block text-xs text-muted-color">Deschide profilul și metodele de autentificare</span>
              </span>
              <i class="pi pi-user text-sm text-muted-color"></i>
            </button>
            <p-button
              type="button"
              class="mt-3 w-full"
              icon="pi pi-sign-out"
              label="Ieșire"
              severity="secondary"
              [outlined]="true"
              (onClick)="signOut()"
            />
          } @else {
            <p-button
              type="button"
              class="w-full"
              icon="pi pi-sign-in"
              label="Autentificare"
              (onClick)="signIn()"
            />
          }
        </div>
      </aside>
    </ng-template>
  </p-drawer>

  <main
    class="shell__main min-h-[calc(100dvh-4rem)] transition-[padding] duration-200"
    [class.lg:pl-[22rem]]="authenticated() && drawerVisible()"
  >
    <router-outlet />
  </main>
</div>

name: Build, publish, and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: eguilde

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: egueducation-backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: egueducation-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}
      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch }}
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  update-gitops:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: egueducation-backend
            source_image: egueducation-backend
            gitops_file: namespaces/education/egueducation/backend/kustomization.yaml
          - image: egueducation-frontend
            source_image: egueducation-frontend
            gitops_file: namespaces/education/egueducation/frontend/kustomization.yaml
    steps:
      - name: Update deployed image in GitOps
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          IMAGE: ${{ matrix.image }}
          SOURCE_IMAGE: ${{ matrix.source_image }}
          FILE: ${{ matrix.gitops_file }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7; do
            response="$(gh api "repos/eguilde/gitops/contents/${FILE}?ref=main")"
            sha="$(jq -r '.sha' <<<"${response}")"
            current="$(jq -r '.content' <<<"${response}" | tr -d '\n' | base64 --decode)"
            updated="$(printf '%s' "${current}" | sed -E "s#(ghcr\\.io|forge\\.eguilde\\.cloud|registry\\.eguilde\\.cloud)/eguilde/${SOURCE_IMAGE}(:[^[:space:]]+)?#ghcr.io/eguilde/${IMAGE}:${GITHUB_SHA}#g")"
            if [ "${updated}" = "${current}" ]; then
              echo "GitOps already points at ${IMAGE}:${GITHUB_SHA}"
              exit 0
            fi
            content="$(printf '%s' "${updated}" | base64 -w0)"
            payload="$(jq -n --arg message "chore(${IMAGE}): deploy ${GITHUB_SHA}" --arg content "${content}" --arg sha "${sha}" '{message:$message,content:$content,sha:$sha,branch:"main"}')"
            if gh api --method PUT "repos/eguilde/gitops/contents/${FILE}" --input - <<<"${payload}" >/dev/null; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo 'GitOps update failed after retries' >&2
          exit 1
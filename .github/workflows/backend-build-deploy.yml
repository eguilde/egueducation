name: Build Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/scripts/**
      - .github/workflows/backend-build-deploy.yml
  workflow_dispatch:
    inputs:
      gitops_ref:
        description: 'GitOps branch/tag to update'
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-manifest:
    name: Publish multi-arch manifest
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64

      - name: Update GitOps repository
        uses: actions/checkout@v4
        with:
          repository: eguilde/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          ref: ${{ inputs.gitops_ref || 'main' }}

      - name: Update kustomization tag
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd namespaces/education/egueducation/backend
          sed -i "s/newTag:.*/newTag: ${{ github.sha }}/" kustomization.yaml
          git add kustomization.yaml
          git commit -m "ci(egueducation-backend): update image tag to ${{ github.sha }}" || echo "No changes"
          for i in 1 2 3 4 5; do
            git pull --rebase origin ${{ inputs.gitops_ref || 'main' }} && break
            echo "Retry $i/5 in $((2**i))s..."
            sleep $((2**i))
          done
          git push origin ${{ inputs.gitops_ref || 'main' }}

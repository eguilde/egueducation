name: Sync Education Registry Secret

on:
  push:
    branches: [main]
    paths:
      - '.forgejo/workflows/sync-education-registry-secret.yml'
      - '.forgejo/workflows/backend-build-deploy.yml'
      - '.forgejo/workflows/frontend-build-deploy.yml'
  workflow_dispatch:

concurrency:
  group: egueducation-sync-education-registry-secret
  cancel-in-progress: true

jobs:
  sync-secret:
    runs-on: lan-builder-amd64
    env:
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Sync education pull secret
        run: |
          set -euo pipefail
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace education \
            --docker-server=forge.eguilde.cloud \
            --docker-username="${REGISTRY_USERNAME}" \
            --docker-password="${REGISTRY_PASSWORD}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -
          kubectl create secret docker-registry registry-eguilde-pull \
            --namespace education \
            --docker-server=forge.eguilde.cloud \
            --docker-username="${REGISTRY_USERNAME}" \
            --docker-password="${REGISTRY_PASSWORD}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Restart EguEducation deployments
        run: |
          set -euo pipefail
          kubectl rollout restart deployment/egueducation-backend deployment/egueducation-frontend -n education

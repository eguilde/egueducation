name: Sync Education Registry Secret

on:
  workflow_dispatch:

concurrency:
  group: egueducation-sync-education-registry-secret
  cancel-in-progress: true

jobs:
  sync-secret:
    runs-on: lan-builder
    env:
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Sync education pull secret
        run: |
          set -euo pipefail
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace education \
            --docker-server=registry.eguilde.cloud \
            --docker-username="${REGISTRY_USERNAME}" \
            --docker-password="${REGISTRY_PASSWORD}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Restart EguEducation deployments
        run: |
          set -euo pipefail
          kubectl rollout restart deployment/egueducation-backend deployment/egueducation-frontend -n education

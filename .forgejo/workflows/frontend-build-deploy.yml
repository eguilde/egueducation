name: Frontend Build And Deploy

on:
  workflow_dispatch:
    inputs:
      gitops_ref:
        description: GitOps branch to update
        required: true
        default: main

concurrency:
  group: egueducation-frontend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: registry.eguilde.cloud/eguilde/egueducation-frontend
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-deploy:
    runs-on: lan-builder
    env:
      SCM_PASSWORD: ${{ secrets.SCM_PASSWORD }}
      SCM_USERNAME: ${{ secrets.SCM_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation gitops
          auth_header=$(printf '%s' "${SCM_USERNAME}:${SCM_PASSWORD}" | base64 | tr -d '\n')
          git -c http.extraHeader="Authorization: Basic ${auth_header}" \
            clone "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Validate frontend image build
        run: |
          set -euo pipefail
          docker build \
            --file egueducation/frontend/Dockerfile \
            --tag egueducation-frontend-ci:${GITHUB_SHA} \
            egueducation/frontend

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          echo "${REGISTRY_PASSWORD}" | docker login registry.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx build \
            --platform "${PLATFORMS}" \
            --file egueducation/frontend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            --push \
            egueducation/frontend

      - name: Update frontend GitOps image tag
        run: |
          set -euo pipefail
          auth_header=$(printf '%s' "${SCM_USERNAME}:${SCM_PASSWORD}" | base64 | tr -d '\n')
          git -c http.extraHeader="Authorization: Basic ${auth_header}" \
            clone "https://forge.eguilde.cloud/eguilde/gitops.git" gitops
          cd gitops
          git checkout "${{ inputs.gitops_ref }}"
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@eguilde.cloud"
          git config http.https://forge.eguilde.cloud/.extraheader "Authorization: Basic ${auth_header}"

          file="namespaces/education/egueducation/frontend/kustomization.yaml"
          awk -v source_image="registry.eguilde.cloud/eguilde/egueducation-frontend" -v target_image="${IMAGE}" -v tag="${GITHUB_SHA}" '
            $0 ~ "^- name: " source_image "$" || $0 ~ "^- name: " target_image "$" {
              print "- name: " source_image
              print "  newName: " target_image
              print "  newTag: " tag
              in_image=1
              next
            }
            in_image && $0 ~ "^  newName:" { next }
            in_image && $0 ~ "^  newTag:" { next }
            in_image && $0 ~ "^- name:" { in_image=0; print; next }
            { print }
          ' "$file" > "$file.tmp"
          mv "$file.tmp" "$file"

          git add "$file"
          git diff --cached --quiet && exit 0
          git commit -m "chore(egueducation-frontend): deploy ${GITHUB_SHA}"
          git pull --rebase origin "${{ inputs.gitops_ref }}"
          git push origin "HEAD:${{ inputs.gitops_ref }}"

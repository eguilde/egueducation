name: Backend Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      gitops_ref:
        description: GitOps branch to update
        required: true
        default: main

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: registry.eguilde.cloud/eguilde/egueducation-backend
  PLATFORMS: linux/amd64

jobs:
  build-and-deploy:
    runs-on: lan-builder
    env:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      SCM_PASSWORD: ${{ secrets.SCM_PASSWORD }}
      SCM_USERNAME: ${{ secrets.SCM_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation gitops
          git clone "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Validate backend image build
        run: |
          set -euo pipefail
          docker build \
            --file egueducation/backend/Dockerfile \
            --tag egueducation-backend-ci:${GITHUB_SHA} \
            egueducation/backend

      - name: Build and push backend image
        run: |
          set -euo pipefail
          echo "${REGISTRY_PASSWORD}" | docker login registry.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx build \
            --platform "${PLATFORMS}" \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            --push \
            egueducation/backend

      - name: Update backend GitOps image tag
        run: |
          set -euo pipefail
          gitops_ref="${INPUT_GITOPS_REF:-main}"
          if [ -n "${GITOPS_TOKEN:-}" ]; then
            gitops_url="https://oauth2:${GITOPS_TOKEN}@forge.eguilde.cloud/eguilde/gitops.git"
          else
            test -n "${SCM_USERNAME:-}" || { echo "SCM_USERNAME secret is missing"; exit 1; }
            test -n "${SCM_PASSWORD:-}" || { echo "SCM_PASSWORD secret is missing"; exit 1; }
            gitops_url="https://${SCM_USERNAME}:${SCM_PASSWORD}@forge.eguilde.cloud/eguilde/gitops.git"
          fi

          git clone "${gitops_url}" gitops
          cd gitops
          git checkout "${gitops_ref}"
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@eguilde.cloud"

          file="namespaces/education/egueducation/backend/kustomization.yaml"
          awk -v source_image="registry.eguilde.cloud/eguilde/egueducation-backend" -v target_image="${IMAGE}" -v tag="${GITHUB_SHA}" '
            $0 ~ "^[[:space:]]*- name: " source_image "$" || $0 ~ "^[[:space:]]*- name: " target_image "$" {
              print "- name: " source_image
              print "  newName: " target_image
              print "  newTag: " tag
              in_image=1
              next
            }
            in_image && $0 ~ "^[[:space:]]+newName:" { next }
            in_image && $0 ~ "^[[:space:]]+newTag:" { next }
            in_image && $0 ~ "^- name:" { in_image=0; print; next }
            { print }
          ' "$file" > "$file.tmp"
          mv "$file.tmp" "$file"

          git add "$file"
          git diff --cached --quiet && exit 0
          git commit -m "chore(egueducation-backend): deploy ${GITHUB_SHA}"
          git pull --rebase origin "${gitops_ref}"
          git push origin "HEAD:${gitops_ref}"
        env:
          INPUT_GITOPS_REF: ${{ inputs.gitops_ref }}

name: Backend Build And Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.forgejo/scripts/**'
      - '.forgejo/workflows/backend-build-deploy.yml'
  workflow_dispatch:

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: registry.eguilde.cloud/eguilde/egueducation-backend
  LEGACY_IMAGE: forge.eguilde.cloud/eguilde/egueducation-backend
  CONTEXT_DIR: egueducation/backend
  DOCKERFILE: Dockerfile
  SERVICE_NAME: backend
  GITOPS_FILE: namespaces/education/egueducation/backend/kustomization.yaml
  FORGEJO_CLONE_BASE_URL: https://forge.eguilde.cloud

jobs:
  build-amd64:
    name: Build backend amd64
    runs-on: lan-builder-amd64
    defaults:
      run:
        shell: bash
    env:
      ARCH: amd64
      BUILDKIT_HOST: tcp://10.152.183.50:1234
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Build amd64 image
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"
          cd ..
          bash egueducation/.forgejo/scripts/build-image.sh

  build-arm64:
    name: Build backend arm64
    runs-on: lan-builder-arm64
    defaults:
      run:
        shell: bash
    env:
      ARCH: arm64
      BUILDKIT_HOST: tcp://10.152.183.217:1234
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Build arm64 image
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"
          cd ..
          bash egueducation/.forgejo/scripts/build-image.sh

  publish-manifest:
    name: Publish backend OCI index
    runs-on: lan-builder-amd64
    needs: [build-amd64, build-arm64]
    defaults:
      run:
        shell: bash
    env:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      GITOPS_USERNAME: ${{ secrets.GITOPS_USERNAME }}
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Publish OCI index and update GitOps
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"
          cd ..
          bash egueducation/.forgejo/scripts/publish-image.sh

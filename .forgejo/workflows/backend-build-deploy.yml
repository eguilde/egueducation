name: Backend Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: registry.eguilde.cloud/eguilde/egueducation-backend
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-deploy:
    runs-on: lan-builder
    env:
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation gitops
          git clone "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Validate backend image build
        run: |
          set -euo pipefail
          docker build \
            --file egueducation/backend/Dockerfile \
            --tag egueducation-backend-ci:${GITHUB_SHA} \
            egueducation/backend

      - name: Prepare multi-platform builder
        run: |
          set -euo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install amd64,arm64
          docker buildx inspect egueducation-multiarch >/dev/null 2>&1 || docker buildx create --name egueducation-multiarch --driver docker-container
          docker buildx use egueducation-multiarch
          docker buildx inspect --bootstrap

      - name: Build and push backend image
        run: |
          set -euo pipefail
          echo "${REGISTRY_PASSWORD}" | docker login registry.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx build \
            --platform "${PLATFORMS}" \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            --provenance=false \
            --sbom=false \
            --push \
            egueducation/backend

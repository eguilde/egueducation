name: Backend Build And Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.forgejo/workflows/backend-build-deploy.yml'
      - '.forgejo/workflows/sync-education-registry-secret.yml'
  workflow_dispatch:

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: forge.eguilde.cloud/eguilde/egueducation-backend
  FORGEJO_CLONE_BASE_URL: https://forge.eguilde.cloud

jobs:
  build-amd64:
    name: Build backend amd64
    runs-on: lan-builder-amd64
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://172.17.0.1:2375
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Build and push backend amd64 image
        run: |
          set -euo pipefail
          cache_dir="/var/cache/eguilde/buildx/egueducation-backend-amd64"
          cache_next="${cache_dir}.next"
          cache_ref="forge.eguilde.cloud/eguilde/egueducation-backend-buildcache:amd64"
          mkdir -p "${cache_dir}"
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          if docker buildx inspect egueducation-backend-amd64 >/dev/null 2>&1; then
            docker buildx use egueducation-backend-amd64
          else
            docker buildx create --name egueducation-backend-amd64 --driver docker-container --use
          fi
          docker buildx inspect egueducation-backend-amd64 --bootstrap >/dev/null
          cache_from_args=(--cache-from "type=registry,ref=${cache_ref}")
          if [ -f "${cache_dir}/index.json" ]; then
            cache_from_args+=(--cache-from "type=local,src=${cache_dir}")
          fi
          rm -rf "${cache_next}"
          docker buildx build \
            "${cache_from_args[@]}" \
            --cache-to "type=local,dest=${cache_next},mode=max" \
            --cache-to "type=registry,ref=${cache_ref},mode=max" \
            --platform linux/amd64 \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}-amd64" \
            --tag "${IMAGE}:latest-amd64" \
            --provenance=false \
            --sbom=false \
            --push \
            egueducation/backend
          rm -rf "${cache_dir}"
          mv "${cache_next}" "${cache_dir}"

  build-arm64:
    name: Build backend arm64
    runs-on: lan-builder-arm64
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://172.17.0.1:2375
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Build and push backend arm64 image
        run: |
          set -euo pipefail
          cache_dir="/var/cache/eguilde/buildx/egueducation-backend-arm64"
          cache_next="${cache_dir}.next"
          cache_ref="forge.eguilde.cloud/eguilde/egueducation-backend-buildcache:arm64"
          mkdir -p "${cache_dir}"
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          if docker buildx inspect egueducation-backend-arm64 >/dev/null 2>&1; then
            docker buildx use egueducation-backend-arm64
          else
            docker buildx create --name egueducation-backend-arm64 --driver docker-container --use
          fi
          docker buildx inspect egueducation-backend-arm64 --bootstrap >/dev/null
          cache_from_args=(--cache-from "type=registry,ref=${cache_ref}")
          if [ -f "${cache_dir}/index.json" ]; then
            cache_from_args+=(--cache-from "type=local,src=${cache_dir}")
          fi
          rm -rf "${cache_next}"
          docker buildx build \
            "${cache_from_args[@]}" \
            --cache-to "type=local,dest=${cache_next},mode=max" \
            --cache-to "type=registry,ref=${cache_ref},mode=max" \
            --platform linux/arm64 \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}-arm64" \
            --tag "${IMAGE}:latest-arm64" \
            --provenance=false \
            --sbom=false \
            --push \
            egueducation/backend
          rm -rf "${cache_dir}"
          mv "${cache_next}" "${cache_dir}"

  publish-manifest:
    name: Publish backend manifest
    runs-on: lan-builder-amd64
    needs: [build-amd64, build-arm64]
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://172.17.0.1:2375
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      GITOPS_USERNAME: ${{ secrets.GITOPS_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
    steps:
      - name: Publish multi-arch backend manifest
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx imagetools create \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            "${IMAGE}:${GITHUB_SHA}-amd64" \
            "${IMAGE}:${GITHUB_SHA}-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"

      - name: Update GitOps image tag
        run: |
          set -euo pipefail
          GITOPS_AUTH_HEADER="$(printf '%s:%s' "${GITOPS_USERNAME}" "${GITOPS_TOKEN}" | base64 | tr -d '\n')"
          git -c http.extraHeader="Authorization: Basic ${GITOPS_AUTH_HEADER}" \
            clone "https://forge.eguilde.cloud/eguilde/gitops.git" gitops
          cd gitops
          git checkout main
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@eguilde.cloud"

          file="namespaces/education/egueducation/backend/kustomization.yaml"
          awk -v target_image="${IMAGE}" -v tag="${GITHUB_SHA}" '
            $0 ~ "^- name: " target_image "$" || $0 ~ "^[[:space:]]+- name: " target_image "$" {
              print "  - name: " target_image
              print "    newName: " target_image
              print "    newTag: " tag
              in_image=1
              next
            }
            in_image && $0 ~ "^[[:space:]]+newName:" { next }
            in_image && $0 ~ "^[[:space:]]+newTag:" { next }
            in_image && $0 ~ "^[[:space:]]*- name:" { in_image=0; print; next }
            { print }
          ' "$file" > "$file.tmp"
          mv "$file.tmp" "$file"

          git add "$file"
          git diff --cached --quiet && exit 0
          git commit -m "chore(egueducation-backend): deploy ${GITHUB_SHA}"
          git -c http.extraHeader="Authorization: Basic ${GITOPS_AUTH_HEADER}" pull --rebase origin main
          git -c http.extraHeader="Authorization: Basic ${GITOPS_AUTH_HEADER}" push origin HEAD:main



name: Backend Build And Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.forgejo/workflows/backend-build-deploy.yml'
  workflow_dispatch:

concurrency:
  group: egueducation-backend-build-deploy
  cancel-in-progress: true

env:
  IMAGE: forge.eguilde.cloud/eguilde/egueducation-backend
  FORGEJO_CLONE_BASE_URL: https://forge.eguilde.cloud

jobs:
  build-amd64:
    name: Build backend amd64
    runs-on: lan-builder-amd64
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ github.token }}
      REGISTRY_USERNAME: ${{ github.actor }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Build and push backend amd64 image
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx build \
            --platform linux/amd64 \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}-amd64" \
            --tag "${IMAGE}:latest-amd64" \
            --provenance=false \
            --sbom=false \
            --push \
            egueducation/backend

  build-arm64:
    name: Build backend arm64
    runs-on: lan-builder-arm64
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      FORGEJO_TOKEN: ${{ github.token }}
      REGISTRY_PASSWORD: ${{ github.token }}
      REGISTRY_USERNAME: ${{ github.actor }}
    steps:
      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf egueducation
          git -c http.extraHeader="Authorization: token ${FORGEJO_TOKEN}" \
            clone "${FORGEJO_CLONE_BASE_URL}/${GITHUB_REPOSITORY}.git" egueducation
          cd egueducation
          git checkout "${GITHUB_SHA}"

      - name: Build and push backend arm64 image
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx build \
            --platform linux/arm64 \
            --file egueducation/backend/Dockerfile \
            --tag "${IMAGE}:${GITHUB_SHA}-arm64" \
            --tag "${IMAGE}:latest-arm64" \
            --provenance=false \
            --sbom=false \
            --push \
            egueducation/backend

  publish-manifest:
    name: Publish backend manifest
    runs-on: lan-builder-amd64
    needs: [build-amd64, build-arm64]
    defaults:
      run:
        shell: bash
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      REGISTRY_PASSWORD: ${{ github.token }}
      REGISTRY_USERNAME: ${{ github.actor }}
    steps:
      - name: Publish multi-arch backend manifest
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker info >/dev/null
          echo "${REGISTRY_PASSWORD}" | docker login forge.eguilde.cloud --username "${REGISTRY_USERNAME}" --password-stdin
          docker buildx imagetools create \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            "${IMAGE}:${GITHUB_SHA}-amd64" \
            "${IMAGE}:${GITHUB_SHA}-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"

      - name: Update GitOps image tag
        run: |
          set -euo pipefail
          git -c http.extraHeader="Authorization: token ${GITOPS_TOKEN}" \
            clone "https://forge.eguilde.cloud/eguilde/gitops.git" gitops
          cd gitops
          git checkout main
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@eguilde.cloud"
          git config http.https://forge.eguilde.cloud/.extraheader "Authorization: token ${GITOPS_TOKEN}"

          file="namespaces/education/egueducation/backend/kustomization.yaml"
          awk -v target_image="${IMAGE}" -v tag="${GITHUB_SHA}" '
            $0 ~ "^- name: " target_image "$" || $0 ~ "^[[:space:]]+- name: " target_image "$" {
              print "  - name: " target_image
              print "    newName: " target_image
              print "    newTag: " tag
              in_image=1
              next
            }
            in_image && $0 ~ "^[[:space:]]+newName:" { next }
            in_image && $0 ~ "^[[:space:]]+newTag:" { next }
            in_image && $0 ~ "^[[:space:]]*- name:" { in_image=0; print; next }
            { print }
          ' "$file" > "$file.tmp"
          mv "$file.tmp" "$file"

          git add "$file"
          git diff --cached --quiet && exit 0
          git commit -m "chore(egueducation-backend): deploy ${GITHUB_SHA}"
          git pull --rebase origin main
          git push origin HEAD:main

apiVersion: apps/v1
kind: Deployment
metadata:
  name: egueducation-frontend
  namespace: education
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egueducation-frontend
  template:
    metadata:
      labels:
        app: egueducation-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/eguilde/egueducation-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

services:
  api:
    image: golang:1.26
    working_dir: /workspace/backend
    command: sh -lc "go run ./cmd/server"
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/workspace/backend
    env_file:
      - ../backend/.env
    environment:
      ARCHIVE_STORAGE_ENDPOINT: http://minio:9000
      ARCHIVE_STORAGE_BUCKET: archive-documents
      ARCHIVE_STORAGE_ACCESS_KEY: minioadmin
      ARCHIVE_STORAGE_SECRET_KEY: minioadmin123
      ARCHIVE_STORAGE_USE_PATH_STYLE: "true"
      ARCHIVE_TEXTRACT_BUCKET: ""

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data

  web:
    image: node:24
    working_dir: /workspace/frontend
    command: sh -lc "npm install && npm start -- --host 0.0.0.0 --proxy-config proxy.docker.conf.json"
    ports:
      - "4200:4200"
    volumes:
      - ../frontend:/workspace/frontend

volumes:
  minio-data:
